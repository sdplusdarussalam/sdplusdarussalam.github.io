<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('bangunan-sekolah.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo-sekolah.png" alt="Logo SD Plus Darussalam" class="h-10 w-10 object-contain bg-white rounded-full">
                <h1 class="font-bold text-2xl">SD Plus Darussalam</h1>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 flex flex-col md:flex-row gap-6">
        <aside class="w-full md:w-1/4">
            <h2 class="text-xl font-bold mb-4 border-b-2 border-gray-400 pb-2">MENU</h2>
            <div id="menu-container" class="bg-white/80 p-4 rounded shadow space-y-2"></div>
        </aside>

        <section class="w-full md:w-2/4">
            <h2 class="text-2xl font-bold mb-4 border-b-2 border-blue-800 pb-2">Berita Terbaru</h2>
            <div class="bg-white/90 p-4 rounded shadow">
                <h3 class="text-xl font-bold">Pembangunan SD Plus Darussalam</h3>
                <p id="konten-pendek" class="text-gray-600 mt-2">SD Plus Darussalam sedang melakukan pengembangan fasilitas...</p>
                <div id="konten-lengkap" class="hidden text-gray-600 mt-2">Detail pembangunan gedung baru...</div>
                <button onclick="toggleBerita()" id="btn-baca" class="text-blue-600 font-bold mt-4 block">Baca Selengkapnya →</button>
            </div>
        </section>

        <aside class="w-full md:w-1/4">
            <h2 class="text-2xl font-bold mb-4 border-b-2 border-yellow-500 pb-2">Pengumuman</h2>
            <div class="bg-white/80 p-4 rounded shadow space-y-4">
                <div class="border-l-4 border-blue-500 pl-3">
                    <p class="font-semibold text-sm">Jadwal Liburan Semester 2</p>
                    <span class="text-xs text-gray-500">20 Juni - 12 Juli 2026</span>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const menuData = [
            { nama: "Layanan Siswa", sub: [{ nama: "Cek Tagihan", link: "cek-tagihan.html" }] },
            { nama: "Capaian", sub: [{ nama: "Capaian Tahfidz", link: "https://bit.ly/hafalan-siswa" }] }
        ];

        const container = document.getElementById('menu-container');
        menuData.forEach((item, index) => {
            const menuDiv = document.createElement('div');
            menuDiv.innerHTML = `
                <button onclick="toggleMenu(${index})" class="w-full text-left font-bold text-blue-800 hover:text-blue-600 flex justify-between">
                    ${item.nama} <span>▼</span>
                </button>
                <ul id="sub-${index}" class="hidden pl-4 mt-1 space-y-1 border-l-2 border-blue-200">
                    ${item.sub.map(sub => `<li><a href="${sub.link}" class="text-gray-700 hover:text-blue-700 text-sm block">${sub.nama}</a></li>`).join('')}
                </ul>
            `;
            container.appendChild(menuDiv);
        });

        function toggleMenu(index) { document.getElementById(`sub-${index}`).classList.toggle('hidden'); }
        function toggleBerita() {
            const lengkap = document.getElementById('konten-lengkap');
            const pendek = document.getElementById('konten-pendek');
            lengkap.classList.toggle('hidden');
            pendek.classList.toggle('hidden');
        }
    </script>
</body>
</html>
