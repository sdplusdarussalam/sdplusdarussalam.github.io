// KONFIGURASI GOOGLE SHEETS (FORMAT JSON - JAUH LEBIH STABIL)
// ==========================================
const SPREADSHEET_ID = '1pR3W50Z24fD__v_Qds6MFsv5LR_BON0N6JceerOm86E';

// Fungsi baru untuk mengambil data Google Sheet menggunakan Google Visualization JSON API (DENGAN FORCED HEADERS)
async function fetchSheetData(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
    const response = await fetch(url);
    const text = await response.text();
    
    const jsonLeft = text.indexOf('{');
    const jsonRight = text.lastIndexOf('}') + 1;
    const cleanJson = JSON.parse(text.substring(jsonLeft, jsonRight));
    
    const rows = cleanJson.table.rows;
    const cols = cleanJson.table.cols.map(col => col && col.label ? col.label.trim() : '');
    
    return rows.map(row => {
        const obj = {};
        cols.forEach((colName, index) => {
            if (colName) {
                const cell = row.c[index];
                let cellValue = '';
                
                if (cell) {
                    // Gunakan cell.f (format tampilan teks asli) agar teks manual seperti "20 Juni - 12 Juli" tidak hilang
                    if (cell.f !== null && cell.f !== undefined) {
                        cellValue = cell.f;
                    } else if (cell.v !== null && cell.v !== undefined) {
                        cellValue = cell.v;
                    }
                }
                
                obj[colName] = String(cellValue).replaceAll('\n', '<br>');
            }
        });
        return obj;
    }).filter(item => item.judul && item.judul.trim() !== ""); // Filter baris kosong
}

        `;

    });
}

function renderPengumuman(data) {
    const containerPengumuman = document.getElementById('pengumuman-container');

    containerPengumuman.innerHTML = `

            <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

            </svg>
            Pengumuman
        </h2>
        <div class="space-y-3 max-h-[420px] overflow-y-auto pr-1" style="scrollbar-width: thin;">
    `;

    const dataValid = data.filter(p => p.judul && p.judul.toString().trim() !== "");

    if (dataValid.length === 0) {
        containerPengumuman.innerHTML += `
            <p class="text-gray-500 text-sm py-4 text-center italic bg-gray-50 rounded border border-dashed border-gray-200">Tidak ada pengumuman baru.</p>
            </div>
        `;
        return;
    }

    function rapikanTanggal(tgl) {
        if (!tgl) return '';
        const stringTgl = String(tgl).trim();
        if (stringTgl.startsWith('Date(')) {
            try {
                const bagian = stringTgl.match(/\(([^)]+)\)/)[1].split(',');
                const tahun = parseInt(bagian[0]);
                const bulan = parseInt(bagian[1]); 
                const hari = parseInt(bagian[2]);
                const namaBulan = [
                    "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
                    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
                ];
                return `${hari} ${namaBulan[bulan]} ${tahun}`;
            } catch (e) {
                return stringTgl;
            }
        }
        return stringTgl;
    }

    let listHtml = '';
    [...dataValid].reverse().forEach(p => {
        const tanggalRapi = rapikanTanggal(p.tanggal);
        listHtml += `
            <div class="bg-white hover:bg-yellow-50/20 border border-gray-150 hover:border-yellow-300 p-4 rounded-lg shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer">
                <div class="border-l-4 border-yellow-500 pl-3">
                    <p class="font-semibold text-gray-800 text-sm leading-relaxed mb-1.5 hover:text-yellow-600 transition-colors">${p.judul}</p>
                    ${tanggalRapi ? `
                        <div class="flex items-center text-xs text-gray-500 gap-1.5 font-medium">
                            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span>${tanggalRapi}</span>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    });

    containerPengumuman.innerHTML += listHtml + '</div>';
}

// TOGGLE INTERACTIVE FUNCTIONS
function toggleMenu(index) {
    const subMenu = document.getElementById(`sub-${index}`);
    const arrow = document.getElementById(`arrow-${index}`);
    if (subMenu && arrow) {
        const isHidden = subMenu.classList.toggle('hidden');
        arrow.textContent = isHidden ? '▼' : '▲';
    }
}
function toggleNestedMenu(parentIndex, nestedIndex) {
    const nestedSubMenu = document.getElementById(`nested-sub-${parentIndex}-${nestedIndex}`);
    const nestedArrow = document.getElementById(`nested-arrow-${parentIndex}-${nestedIndex}`);
    if (nestedSubMenu && nestedArrow) {
        const isHidden = nestedSubMenu.classList.toggle('hidden');
        nestedArrow.textContent = isHidden ? '▼' : '▲';
    }
}
function toggleDeepNestedMenu(parentIndex, nestedIndex, catIndex) {
    const deepSubMenu = document.getElementById(`deep-sub-${parentIndex}-${nestedIndex}-${catIndex}`);
    const deepArrow = document.getElementById(`deep-arrow-${parentIndex}-${nestedIndex}-${catIndex}`);
    if (deepSubMenu && deepArrow) {
        const isHidden = deepSubMenu.classList.toggle('hidden');
        deepArrow.textContent = isHidden ? '▼' : '▲';
    }
}
function toggleBerita(id) {

        pendek.classList.toggle('hidden');
        btn.innerHTML = lengkap.classList.contains('hidden') ? "Baca Selengkapnya →" : "Sembunyikan ←";
    }
}
